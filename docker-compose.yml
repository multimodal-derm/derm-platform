services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - GATEWAY_PORT=8080
      - INFERENCE_URL=http://inference:8081
      - ALLOWED_ORIGINS=http://localhost:3000
      - MAX_UPLOAD_SIZE_MB=10
    depends_on:
      inference:
        condition: service_started
    restart: unless-stopped

  inference:
    build: ./inference
    ports:
      - "8081:8081"
    environment:
      - CHECKPOINT_PATH=/app/model/best.pt
      - DEVICE=cpu
    volumes:
      - ./model:/app/model:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - gateway
    restart: unless-stopped
